<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Intake Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --paper:#0D0D0D;
  --panel:#161616;
  --ink:#F2EFE8;
  --ink-soft:#938F84;
  --line:#3A362E;
  --accent:#E7B23A;
  --good:#5FBF77;
  --over:#E8604A;
  --hair:#2A2823;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  padding:28px 16px 80px;
  min-height:100vh;
}

.wrap{max-width:520px;margin:0 auto;}

/* ---- Header ---- */
.masthead{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  border-bottom:6px solid var(--accent);
  padding-bottom:10px;
  margin-bottom:18px;
}
.masthead h1{
  font-family:'Archivo Black',sans-serif;
  font-size:20px;
  line-height:1.15;
  letter-spacing:0.3px;
  margin:0;
}
@media (max-width:400px){
  .masthead h1{font-size:17px;}
}
.masthead .sub{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  letter-spacing:1px;
  text-transform:uppercase;
}

/* ---- Date nav ---- */
.datebar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin-bottom:18px;
  font-family:'Space Mono',monospace;
  font-size:13px;
}
.datebar button{
  background:none;
  border:1px solid var(--line);
  color:var(--ink);
  width:30px;height:30px;
  cursor:pointer;
  font-family:'Space Mono',monospace;
  font-size:14px;
  border-radius:0;
}
.datebar button:hover{background:var(--accent);color:var(--paper);}
.datebar input[type="date"]{
  font-family:'Space Mono',monospace;
  border:1px solid var(--hair);
  padding:5px 8px;
  background:var(--paper);
  color:var(--ink);
  max-width:120px;
  min-width:0;
}
.datebar .today-btn{
  border:none;
  width:auto;
  padding:0 10px;
  text-decoration:underline;
  text-underline-offset:3px;
}

/* ---- Nutrition Facts style summary panel ---- */
.facts{
  border:2px solid var(--accent);
  padding:0;
  margin-bottom:24px;
  background:var(--panel);
}
.facts-top{
  border-bottom:9px solid var(--accent);
  padding:10px 14px 8px;
  text-align:center;
}
.facts-top .eyebrow{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--ink-soft);
}
.facts-top h2{
  font-family:'Archivo Black',sans-serif;
  font-size:22px;
  margin:2px 0 0;
}
.facts-row{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  padding:8px 14px;
  border-bottom:1px solid var(--line);
}
.facts-row.thick{border-bottom:4px solid var(--accent);}
.facts-row .label{
  font-size:14px;
  font-weight:600;
}
.facts-row .value{
  font-family:'Archivo Black',sans-serif;
  font-size:20px;
  color:var(--accent);
}
.facts-row .value.big{font-size:34px;}
.facts-row.remaining .value{
  color:var(--good);
}
.facts-row.remaining.over .value{
  color:var(--over);
}
.facts-goal-edit{
  display:flex;
  align-items:center;
  gap:6px;
}
.facts-goal-edit input{
  width:64px;
  font-family:'Space Mono',monospace;
  border:none;
  border-bottom:1px solid var(--hair);
  background:transparent;
  color:var(--ink);
  font-size:14px;
  padding:2px 0;
  text-align:right;
}
.facts-goal-edit input:focus{outline:none;border-bottom:1px solid var(--accent);}

.bar-track{
  height:10px;
  margin:0 14px 12px;
  background:var(--panel);
  border:1px solid var(--line);
  position:relative;
  overflow:hidden;
}
.bar-fill{
  height:100%;
  background:var(--accent);
  transition:width .3s ease, background .3s ease;
}
.bar-fill.over{background:var(--over);}

.macro-row{
  display:flex;
  justify-content:space-between;
  padding:10px 14px 14px;
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.macro-row div span{
  display:block;
  font-family:'Inter',sans-serif;
  color:var(--accent);
  font-size:15px;
  font-weight:700;
  text-transform:none;
  letter-spacing:0;
  margin-top:2px;
}

/* ---- Log entries ---- */
.log-head{
  background:var(--accent);
  color:#141210;
  padding:6px 12px;
  font-family:'Space Mono',monospace;
  font-size:12px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:0;
}
.entries{
  border-left:1px solid var(--hair);
  border-right:1px solid var(--hair);
  border-bottom:1px solid var(--hair);
  margin-bottom:20px;
}
.entry{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
  border-bottom:1px solid var(--hair);
  gap:10px;
}
.entry:last-child{border-bottom:none;}
.entry .name{
  font-weight:600;
  font-size:14px;
}
.entry .macros{
  font-family:'Space Mono',monospace;
  font-size:10.5px;
  color:var(--ink-soft);
  margin-top:2px;
}
.entry .right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.entry .cal{
  font-family:'Archivo Black',sans-serif;
  font-size:15px;
  color:var(--accent);
}
.entry .del{
  background:none;
  border:1px solid var(--hair);
  color:var(--ink-soft);
  width:24px;height:24px;
  cursor:pointer;
  font-size:13px;
  line-height:1;
}
.entry .del:hover{border-color:var(--over);color:var(--over);}
.empty-row{
  padding:14px 12px;
  font-size:13px;
  color:var(--ink-soft);
  font-style:italic;
}

/* ---- Add form ---- */
.add-form{
  border:1px solid var(--line);
  padding:14px;
  margin-top:26px;
}
.add-form .eyebrow{
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:10px;
  display:block;
}
.add-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}
.field{display:flex;flex-direction:column;gap:4px;min-width:0;}
.field.full{grid-column:1/-1;}
.field label{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.field input, .field select{
  width:100%;
  border:1px solid var(--hair);
  padding:8px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  background:var(--panel);
  color:var(--ink);
}
.field input:focus, .field select:focus{outline:none;border-color:var(--accent);}
.submit-btn{
  width:100%;
  padding:12px;
  background:var(--accent);
  color:#141210;
  border:none;
  font-family:'Archivo Black',sans-serif;
  font-size:14px;
  letter-spacing:0.5px;
  cursor:pointer;
}
.submit-btn:hover{background:#F2C463;}
.submit-btn:disabled{background:var(--hair);cursor:not-allowed;}

.hint{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--ink-soft);
  text-align:center;
  margin-top:22px;
}

@media (max-width:400px){
  .facts-row .value.big{font-size:28px;}
  .add-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <h1>Daily Intake Calculator</h1>
  </div>

  <div class="datebar">
    <button type="button" id="prevDay" aria-label="Previous day">‹</button>
    <input type="date" id="dateInput">
    <button type="button" class="today-btn" id="todayBtn">today</button>
    <button type="button" id="nextDay" aria-label="Next day">›</button>
  </div>

  <div class="facts">
    <div class="facts-top">
      <div class="eyebrow" id="factsDate">—</div>
      <h2>Daily Intake</h2>
    </div>

    <div class="facts-row thick">
      <div class="label">Calories logged</div>
      <div class="value big" id="totalCal">0</div>
    </div>

    <div class="facts-row">
      <div class="label">Daily goal</div>
      <div class="facts-goal-edit">
        <input type="number" id="goalInput" min="0" step="10">
        <span style="font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-soft);">cal</span>
      </div>
    </div>

    <div class="facts-row remaining" id="remainingRow">
      <div class="label" id="remainingLabel">Remaining</div>
      <div class="value" id="remainingVal">0</div>
    </div>

    <div class="bar-track"><div
